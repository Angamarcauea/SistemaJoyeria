{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 40px auto; border: 1px solid var(--gold); padding: 40px; background-color: #fff;">
    <h2 style="color: var(--gold); text-align: center; text-transform: uppercase; letter-spacing: 2px;">
        ✨ Registro de Nueva Pieza ✨
    </h2>
    <p style="text-align: center; color: #666; font-style: italic; margin-bottom: 30px;">
        Ingrese los detalles de la joya para actualizar el inventario global y los respaldos.
    </p>

    <form action="/producto_form" method="POST" style="display: flex; flex-direction: column; gap: 20px;">

        <div class="form-group">
            <label style="display: block; font-weight: bold; margin-bottom: 5px; color: var(--black);">Nombre de la Joya:</label>
            <input type="text" name="nombre" placeholder="Ej: Anillo de Oro con Rubí" required
                   style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
        </div>

        <div class="form-group">
            <label style="display: block; font-weight: bold; margin-bottom: 5px; color: var(--black);">Material Precioso:</label>
            <select name="material" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                <option value="" disabled selected>Seleccione un material...</option>
                <option value="Oro 18k">Oro 18k</option>
                <option value="Plata 925">Plata 925</option>
                <option value="Platino">Platino</option>
                <option value="Diamantes/Gemas">Diamantes o Gemas</option>
                <option value="Oro Blanco">Oro Blanco</option>
            </select>
        </div>

        <div style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; color: var(--black);">Cantidad (Stock):</label>
                <input type="number" name="cantidad" min="1" placeholder="0" required
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
            <div style="flex: 1;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px; color: var(--black);">Precio Unitario ($):</label>
                <input type="number" step="0.01" name="precio" placeholder="0.00" required
                       style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
            </div>
        </div>

        <div style="margin-top: 20px;">
            <button type="submit" class="btn-oro" style="width: 100%; padding: 15px; font-size: 1.1em; cursor: pointer; transition: 0.3s;">
                💎 GUARDAR EN SISTEMA Y RESPALDOS 💎
            </button>
        </div>

        <div style="text-align: center; margin-top: 15px;">
            <a href="{{ url_for('mostrar_productos') }}" style="color: #888; text-decoration: none; font-size: 0.9em;">
                ← Cancelar y volver al inventario
            </a>
        </div>
    </form>
</div>

<style>
    /* Efecto de enfoque para los inputs */
    input:focus, select:focus {
        outline: none;
        border-color: var(--gold) !important;
        box-shadow: 0 0 5px rgba(212, 175, 55, 0.5);
    }
</style>
{% endblock %}
