{% extends "base.html" %}
{% block content %}
<div class="card" style="text-align: center;">
    <h1 style="font-size: 3.5em; color: var(--gold); margin-bottom: 0;">JOYERÍA LUXURY</h1>
    <p style="letter-spacing: 5px; color: #555; margin-bottom: 40px;">SISTEMA DE CONTROL DE PIEZAS PRECIOSAS</p>

    <div style="display: flex; justify-content: center; gap: 20px;">
        <div style="padding: 20px; border: 1px solid #eee; border-radius: 8px;">
            <h3 style="color: var(--gold);">Base de Datos</h3>
            <p>Gestión segura en <strong>joyeria.db</strong></p>
        </div>
        <div style="padding: 20px; border: 1px solid #eee; border-radius: 8px;">
            <h3 style="color: var(--gold);">Persistencia</h3>
            <p>Respaldo en <strong>JSON, CSV y TXT</strong></p>
        </div>
    </div>
</div>
{% endblock %}
